name: factu-refresh

on:
  schedule:
    - cron: "0 8 * * *"   # daily 08:00 UTC (03:00 Bogota)
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Fetch data
        run: python factu.py
        env:
          EVO_CO_USER: ${{ secrets.EVO_CO_USER }}
          EVO_CO_PASS: ${{ secrets.EVO_CO_PASS }}
          EVO_MX_USER: ${{ secrets.EVO_MX_USER }}
          EVO_MX_PASS: ${{ secrets.EVO_MX_PASS }}
          EVO_BR_USER: ${{ secrets.EVO_BR_USER }}
          EVO_BR_PASS: ${{ secrets.EVO_BR_PASS }}
      - name: Commit data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "data refresh $(date -u +%Y-%m-%d)"
          git push
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - uses: actions/deploy-pages@v4
