name: clean-backup

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python clean_backup.py
        env:
          BRANCHES_API_KEY: ${{ secrets.BRANCHES_API_KEY }}
      - name: Commit cleaned backup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/backup/
          git diff --cached --quiet && { echo "no changes"; exit 0; }
          git pull --rebase origin main
          git commit -m "clean backup: drop presale + ACTION_SPORT_CLUB"
          git push
