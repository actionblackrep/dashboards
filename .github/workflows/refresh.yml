name: factu-refresh

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: factu-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Fetch data
        run: python factu.py
        env:
          EVO_CO_USER: ${{ secrets.EVO_CO_USER }}
          EVO_CO_PASS: ${{ secrets.EVO_CO_PASS }}
          EVO_MX_USER: ${{ secrets.EVO_MX_USER }}
          EVO_MX_PASS: ${{ secrets.EVO_MX_PASS }}
          EVO_BR_USER: ${{ secrets.EVO_BR_USER }}
          EVO_BR_PASS: ${{ secrets.EVO_BR_PASS }}
          BRANCHES_API_KEY: ${{ secrets.BRANCHES_API_KEY }}
      - name: Commit and push (with rebase + retry)
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet && { echo "no changes"; exit 0; }
          git commit -m "data refresh $(date -u +%Y-%m-%d)"
          for i in 1 2 3 4 5; do
            git pull --rebase origin main && git push && exit 0 || true
            echo "push attempt $i failed, retrying..."
            sleep $((i*5))
          done
          echo "push failed after retries" && exit 1
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - uses: actions/deploy-pages@v4
